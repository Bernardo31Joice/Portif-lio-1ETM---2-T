<!DOCTYPE html> <!--Descreve a linguagem de programação que está sendo utilizada, nesse caso é o HTML-->
<html lang="pt-br"> <!--início do documento-->
<head> <!-- define o cabeçalho do documento. O conteúdo descrito aqui não aparece no navegador. Essa tag serve para inserir folhas de estilo e scripts-->
    <meta charset="UTF-8"> <!--indica quais serão os caracteres (character set ou charset) será utilizado para renderizar o texto da página-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- fornece os metadados do site para o navegador-->
    <title>Portfólio</title> <!--Título do documento-->
</head> <!--fechamento do cabeçalho do documento-->
<body> <!-- é o espaço em que todas as tags devem ser colocadas. O conteúdo aqui contido é o visual da página. As tags que representam textos, botões e outrros devem ser adicionadas nesse intervalo.-->
    <!-- Um documento HTML é composto por tags que são escritas entre < >. As tags precisam ser abertas e fechadas, o que as diferenciam é que as tags de fechamento possuem uma \ antes do nome.-->
</body> 
</html> <!--fim do documento-->
